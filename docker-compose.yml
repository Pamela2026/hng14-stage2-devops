services:
  redis:
    image: ${REDIS_IMAGE}
    container_name: ${REDIS_CONTAINER_NAME}
    pull_policy: if_not_present
    networks:
      - hng14-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU_LIMIT}
          memory: ${REDIS_MEMORY_LIMIT}

  api:
    image: ${API_IMAGE}
    container_name: ${API_CONTAINER_NAME}
    pull_policy: if_not_present
    ports:
      - "${API_HOST_PORT}:${API_SERVICE_PORT}"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PORT=${API_SERVICE_PORT}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${API_SERVICE_PORT}/docs')\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hng14-network
    deploy:
      resources:
        limits:
          cpus: ${API_CPU_LIMIT}
          memory: ${API_MEMORY_LIMIT}

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: ${FRONTEND_CONTAINER_NAME}
    pull_policy: if_not_present
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_SERVICE_PORT}"
    environment:
      - API_URL=${API_URL}
      - PORT=${FRONTEND_SERVICE_PORT}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${FRONTEND_SERVICE_PORT}/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hng14-network
    deploy:
      resources:
        limits:
          cpus: ${FRONTEND_CPU_LIMIT}
          memory: ${FRONTEND_MEMORY_LIMIT}

  worker:
    image: ${WORKER_IMAGE}
    container_name: ${WORKER_CONTAINER_NAME}
    pull_policy: if_not_present
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_URL=${REDIS_URL}
      - WORKER_DELAY=${WORKER_DELAY}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, redis; r=redis.Redis(host=os.getenv('REDIS_HOST'), port=int(os.getenv('REDIS_PORT'))); r.ping()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hng14-network
    deploy:
      resources:
        limits:
          cpus: ${WORKER_CPU_LIMIT}
          memory: ${WORKER_MEMORY_LIMIT}

networks:
  hng14-network:
    driver: bridge
